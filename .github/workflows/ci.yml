name: CI

# Triggered on both push and pull_request so that:
#   - push:         catches regressions on every branch, not just main,
#                   so failures are visible as soon as code is pushed
#   - pull_request: runs again at merge time to catch conflicts introduced
#                   by other branches landing on main in the interim
on:
  push:
  pull_request:
    branches: [main]

# contents:read is the minimum needed to check out the repo.
# code-quality:write lets actions/upload-code-coverage post the
# coverage comment on pull requests via GitHub's Code Quality feature.
permissions:
  contents: read
  code-quality: write

jobs:
  test:
    # ubuntu-latest is the standard choice for open-source CI: it is faster
    # to start and cheaper than macOS or Windows runners, and the repo has
    # no platform-specific code that would require testing on other OSes.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Pins Python to 3.12 to match the local development environment.
      # Without pinning, GitHub may silently upgrade the runner's default
      # Python and introduce "works locally, fails in CI" surprises.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # --cov=src measures which lines inside src/ are executed during the test run.
      # --cov-report=term-missing prints a table in the CI log showing each file's
      # coverage percentage and the specific line numbers not yet reached by any test.
      # --cov-report=xml writes coverage.xml in Cobertura format, which the upload
      # step below sends to GitHub so it can render a diff comment on pull requests.
      - name: Run tests
        run: pytest -v --cov=src --cov-report=term-missing --cov-report=xml

      # Skipped for PRs from forks: forked repos cannot write back to this repo,
      # so the upload would fail with a permissions error on external contributions.
      - name: Upload coverage report
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-code-coverage@v1
        with:
          file: coverage.xml
          language: Python
          label: code-coverage/pytest
